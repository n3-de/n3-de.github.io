<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📁</text></svg>">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0c0d12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ARCHIVE">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="switchTab('popular')">ARCHIVE</div>
        <div class="header-controls">
            <button class="icon-btn" onclick="openSearch()" title="Поиск">
                <svg viewBox="0 0 24 24" class="header-icon"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
            </button>
            <button class="icon-btn" onclick="jumpToRandomPost()" title="Случайная запись">
                <svg viewBox="0 0 24 24" class="header-icon"><path d="M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h14V5H5zm2.5 2a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm9 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-4.5 4.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-4.5 4.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm9 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/></svg>
            </button>
            <button class="icon-btn lang-toggle-btn" id="langToggleBtn" onclick="toggleLanguage()" title="Язык / Language">RU</button>
            <button class="icon-btn" id="themeToggle" title="Сменить тему">
                <svg viewBox="0 0 24 24" class="header-icon"><path d="M12.1 22c-5.5 0-10-4.5-10-10 0-4.8 3.4-8.9 8-9.8.4-.1.8.1 1 .5.2.4.1.8-.2 1.1-1.8 1.7-2.8 4-2.8 6.5 0 4.9 4 8.9 8.9 8.9 1 0 2-.2 2.9-.5.4-.1.8 0 1 .3.2.3.2.7 0 1-1.8 2.4-4.7 3.9-7.8 3.9z"/></svg>
            </button>
            <button class="primary-btn" onclick="openNewPost()">✚ Написать</button>
        </div>
    </header>

    <nav class="tabs-container">
        <div class="tabs-wrapper">
            <button class="tab active" data-tab="popular">ПОПУЛЯРНОЕ</button>
            <button class="tab" data-tab="new">НОВОЕ</button>
            <button class="tab" data-tab="date">ХРОНОЛОГИЯ</button>
            <button class="tab" data-tab="my">МОИ ПОСТЫ</button>
            <div id="tabIndicator" class="tab-indicator"></div>
        </div>
    </nav>

    <main class="feed-container" id="feed"></main>

    <div class="modal-overlay" id="newPostModal">
        <div class="modal">
            <h2 id="modalTitle">✚ Новый пост</h2>
            <input type="hidden" id="editPostId">
            <input type="hidden" id="quotedPostIdInput">
            <div class="quoted-preview-area" id="quotedPreviewArea">
                <span class="quote-label">Вы цитируете:</span>
                <div id="quotedPreviewContent"></div>
                <button class="remove-quote" onclick="removeQuoteFromNewPost()" type="button">✕</button>
            </div>
            <div class="form-group">
                <label for="newPostAuthor">Твой ник</label>
                <input type="text" id="newPostAuthor" placeholder="Придумай себе ник" maxlength="30">
            </div>
            <div class="form-group">
                <label for="newPostText">Что нового?</label>
                <textarea id="newPostText" rows="5" placeholder="Поделись мыслями..."></textarea>
            </div>
            <div class="form-group">
                <label>Медиафайлы</label>
                <div class="file-upload-wrapper">
                    <label type="button" class="file-label" for="fileInput">📁 Выбрать фото/видео</label>
                    <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none;">
                </div>
                <div class="preview-grid" id="previewGrid"></div>
            </div>
            <div class="form-group">
                <label for="newPostTags">Теги (через пробел)</label>
                <input type="text" id="newPostTags" placeholder="#Ваши теги" maxlength="100">
            </div>
            <div class="form-row">
                <label class="checkbox-container">
                    <input type="checkbox" id="newPostPinned">
                    <span class="checkmark"></span> Закрепить пост
                </label>
            </div>
            <div class="modal-actions">
                <button class="secondary-btn" onclick="closeNewPost()">Отмена</button>
                <button class="primary-btn" id="publishBtn" onclick="publishPost()">📤 Опубликовать</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="searchModal" onclick="if(event.target===this) closeSearch()">
        <div class="modal search-modal">
            <div class="search-header">
                <input type="text" id="searchInput" placeholder="Поиск по тексту, автору или #тегу..." oninput="doSearch()">
                <button class="close-search-btn" onclick="closeSearch()">✕</button>
            </div>
            <div class="search-date-row">
                <input type="date" id="searchDateFrom" class="date-input" onchange="doSearch()">
                <span class="date-separator">—</span>
                <input type="date" id="searchDateTo" class="date-input" onchange="doSearch()">
            </div>
            <div class="search-results" id="searchResults">Начни вводить запрос...</div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal" onclick="if(event.target===this) closeProfile()">
        <div class="modal profile-modal">
            <button class="close-profile-btn" onclick="closeProfile()">✕</button>
            <div id="profileHeader" class="profile-header-block"></div>
            <div id="profileStats" class="profile-stats"></div>
            <hr class="divider">
            <h3>Записи автора:</h3>
            <div id="profilePosts" class="profile-posts-list"></div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
